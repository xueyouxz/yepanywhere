name: Desktop CI

on:
  push:
    branches: [main]
    tags:
      - 'desktop-v*'
    paths:
      - 'packages/desktop/**'
      - 'packages/shared/**'
      - '.github/workflows/desktop-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/desktop/**'
      - 'packages/shared/**'
      - '.github/workflows/desktop-ci.yml'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-latest is mid-migration to macOS 26 (runner-images#14167, rolling
          # out 2026-06-15 → 2026-07-15). Pin the actual runner to macos-26 so releases
          # are deterministic instead of a coin-flip between the 15 and 26 images.
          # `platform: macos-latest` stays as the discriminator the `if:` steps key on;
          # `runner` controls the image. Bump to macos-27 after a test build when announced.
          - platform: macos-latest
            runner: macos-26
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
            target_triple: aarch64-apple-darwin
          - platform: macos-latest
            runner: macos-26
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
            target_triple: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            rust_target: ''
            target_triple: ''

    runs-on: ${{ matrix.runner || matrix.platform }}

    env:
      HAS_MACOS_SIGNING: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 != '' }}
      HAS_MACOS_NOTARIZATION: ${{ secrets.ASC_API_KEY_P8_BASE64 != '' }}
      HAS_WINDOWS_SIGNING: ${{ secrets.AZURE_CLIENT_SECRET != '' }}
      HAS_UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}

    steps:
      - uses: actions/checkout@v6

      # --- Node.js + pnpm ---
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      # --- Rust ---
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './packages/desktop/src-tauri -> target'

      # --- macOS code signing ---
      - name: Set up macOS code signing keychain
        if: matrix.platform == 'macos-latest' && env.HAS_MACOS_SIGNING == 'true'
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          echo "Available signing identities:"
          security find-identity -v -p codesigning build.keychain
          rm -f certificate.p12

      - name: Set up macOS notarization credentials
        if: matrix.platform == 'macos-latest' && env.HAS_MACOS_NOTARIZATION == 'true'
        env:
          ASC_API_KEY_P8_BASE64: ${{ secrets.ASC_API_KEY_P8_BASE64 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          KEY_PATH="$HOME/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"
          echo "$ASC_API_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      # --- Signing env vars ---
      # Inject secrets via this step's `env:` block (GitHub sets the values WITHOUT shell
      # re-parsing) and write them to $GITHUB_ENV with heredocs. Do NOT inline
      # ${{ secrets.* }} into `echo "VAR=..."`: a value containing shell metacharacters
      # (" $ ` \) gets mangled there — an updater password with such a character yields
      # "incorrect updater private key password: Wrong password for that key" at bundle
      # time. Writes stay conditional so empty values don't reach the bundler (an empty
      # APPLE_CERTIFICATE makes Tauri's bundler crash on import).
      - name: Set signing env vars
        shell: bash
        env:
          UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          UPDATER_PW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          MAC_CERT: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MAC_CERT_PW: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          ASC_KEY: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          emit() { { printf '%s<<__YEPEOF__\n' "$1"; printf '%s\n' "$2"; printf '__YEPEOF__\n'; } >> "$GITHUB_ENV"; }
          if [ -n "$UPDATER_KEY" ]; then
            emit TAURI_SIGNING_PRIVATE_KEY "$UPDATER_KEY"
            emit TAURI_SIGNING_PRIVATE_KEY_PASSWORD "$UPDATER_PW"
          fi
          if [ -n "$MAC_CERT" ] && [ "${{ matrix.platform }}" = "macos-latest" ]; then
            emit APPLE_CERTIFICATE "$MAC_CERT"
            emit APPLE_CERTIFICATE_PASSWORD "$MAC_CERT_PW"
            echo "APPLE_SIGNING_IDENTITY=Developer ID Application: Kyle Graehl (VD7BYQ6ABM)" >> "$GITHUB_ENV"
          fi
          if [ -n "$ASC_KEY" ] && [ "${{ matrix.platform }}" = "macos-latest" ]; then
            emit APPLE_API_KEY "$ASC_KEY"
            emit APPLE_API_ISSUER "$ASC_ISSUER"
          fi

      # --- Windows signing tool ---
      - name: Install trusted-signing-cli
        if: matrix.platform == 'windows-latest' && env.HAS_WINDOWS_SIGNING == 'true'
        run: cargo install trusted-signing-cli

      # --- Install frontend dependencies ---
      # --ignore-scripts avoids building native modules (e.g. better-sqlite3)
      # that belong to other workspace packages and aren't needed for the desktop build
      - name: Install frontend dependencies
        run: pnpm install --ignore-scripts

      # --- Extract changelog ---
      - name: Extract changelog
        id: changelog
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#desktop-v}"
          NOTES=$(awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{found=0} found" packages/desktop/CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # --- Build Tauri app ---
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_TRIPLE: ${{ matrix.target_triple }}
          # Windows signing
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        with:
          projectPath: packages/desktop
          tauriScript: pnpm tauri
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && 'desktop-v__VERSION__' || '' }}
          releaseName: 'Yep Anywhere Desktop v__VERSION__'
          releaseBody: ${{ steps.changelog.outputs.notes || 'See the assets to download and install this version.' }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: ${{ startsWith(github.ref, 'refs/tags/') }}
          updaterJsonKeepUniversal: true
          args: >-
            ${{ matrix.args }}
            ${{ matrix.platform == 'macos-latest' && env.HAS_MACOS_SIGNING != 'true' && '--no-sign' || '' }}
            ${{ env.HAS_UPDATER_KEY == 'true' && '--config ''{"bundle":{"createUpdaterArtifacts":true}}''' || '' }}
            ${{ matrix.platform == 'windows-latest' && secrets.AZURE_CLIENT_SECRET != '' && '--config ''{"bundle":{"windows":{"signCommand":"trusted-signing-cli -e https://eus.codesigning.azure.net -a kylegraehl -c jstorrent-profile %1"}}}''' || '' }}

      # --- Diagnose macOS build failure ---
      # Only blame the flaky hdiutil DMG issue when the build actually got past codesign
      # (a signed .app exists) but produced no .dmg. Otherwise point at the real failure,
      # so we don't chase a phantom DMG flake (config error, updater key/pubkey, etc.).
      - name: Diagnose macOS build failure
        if: failure() && matrix.platform == 'macos-latest'
        shell: bash
        run: |
          app=$(find packages/desktop/src-tauri/target -type d -path '*/release/bundle/macos/*.app' 2>/dev/null | head -1)
          dmg=$(find packages/desktop/src-tauri/target -type f -path '*/release/bundle/dmg/*.dmg' 2>/dev/null | head -1)
          if [ -n "$app" ] && [ -z "$dmg" ]; then
            echo "::error::macOS .app built and signed but no .dmg produced — likely the flaky hdiutil/bundle_dmg issue on GH runners. Re-run: gh run rerun ${{ github.run_id }} --failed"
          elif [ -z "$app" ]; then
            echo "::error::macOS build failed before the app bundle was produced (compile / config / codesign). Read the 'Build Tauri app' step log — this is a real error, NOT a DMG flake."
          else
            echo "::error::macOS .app and .dmg both built; failure was a later step (updater signing / latest.json). Read the 'Build Tauri app' step log — NOT a DMG flake."
          fi

      # --- Cleanup ---
      - name: Clean up macOS keychain
        if: matrix.platform == 'macos-latest' && always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          rm -rf ~/private_keys 2>/dev/null || true

  finalize-release:
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    needs: build-tauri
    runs-on: ubuntu-latest
    env:
      HAS_UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@v6

      - name: Remove .sig files from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" --json assets --jq '.assets[].name' | grep '\.sig$' | while read -r name; do
            echo "Deleting $name"
            gh release delete-asset "$TAG" "$name" --yes
          done

      - name: Validate latest.json updater artifact
        if: env.HAS_UPDATER_KEY == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release download "$TAG" -p "latest.json" -D /tmp/ || {
            echo "::error::latest.json not found in release — auto-updates will not work for this version!"
            exit 1
          }
          python3 -c "
          import json
          data = json.load(open('/tmp/latest.json'))
          assert 'version' in data, 'missing version field'
          assert 'platforms' in data, 'missing platforms field'
          platforms = data['platforms']
          assert len(platforms) > 0, 'no platforms in latest.json'
          for key, p in platforms.items():
              assert 'url' in p, f'{key}: missing url'
              assert 'signature' in p, f'{key}: missing signature'
              assert len(p['signature']) > 10, f'{key}: signature suspiciously short'
          print(f'latest.json valid: v{data[\"version\"]} with {len(platforms)} platform(s): {list(platforms.keys())}')
          "

      - name: Update release body with download table
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#desktop-v}"
          REPO="${GITHUB_REPOSITORY}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          CHANGELOG=$(awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{found=0} found" packages/desktop/CHANGELOG.md)

          {
            if [ -n "$CHANGELOG" ]; then
              echo "$CHANGELOG"
              echo ""
            fi
            echo "## Download"
            echo ""
            echo "| Platform | |"
            echo "|----------|-|"
            echo "| macOS (Apple Silicon) | [.dmg](${BASE}/YepAnywhere_${VERSION}_aarch64.dmg) |"
            echo "| macOS (Intel) | [.dmg](${BASE}/YepAnywhere_${VERSION}_x64.dmg) |"
            echo "| Windows | [.exe](${BASE}/YepAnywhere_${VERSION}_x64-setup.exe) · [.msi](${BASE}/YepAnywhere_${VERSION}_x64_en-US.msi) |"
          } > /tmp/release-body.md

          gh release edit "$TAG" --notes-file /tmp/release-body.md
