name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Run type checking
        run: pnpm typecheck

      - name: Install Playwright browser
        timeout-minutes: 10
        run: pnpm -F @yep-anywhere/client exec playwright install chromium

      - name: Run tests
        run: pnpm test

  publish:
    name: Publish package
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write  # For creating GitHub releases
      id-token: write  # Required for OIDC trusted publishing

    env:
      NPM_CONFIG_REGISTRY: "https://registry.npmjs.org/"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Verify trusted publishing runtime
        run: |
          set -euo pipefail
          echo "node $(node --version)"
          npm_version="$(npm --version)"
          echo "npm ${npm_version}"
          node - "${npm_version}" <<'NODE'
          const version = process.argv[2];
          const [major = 0, minor = 0, patch = 0] = version
            .split(".")
            .map((part) => Number.parseInt(part, 10));

          if (
            major < 11 ||
            (major === 11 && minor < 5) ||
            (major === 11 && minor === 5 && patch < 1)
          ) {
            console.error(
              `npm ${version} is too old for trusted publishing; need >=11.5.1`,
            );
            process.exit(1);
          }
          NODE

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify changelog has entry for version
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if ! grep -q "## \[${VERSION}\]" CHANGELOG.md; then
            echo "Error: CHANGELOG.md does not contain an entry for version ${VERSION}"
            echo "Please add a '## [${VERSION}]' section to CHANGELOG.md before releasing."
            exit 1
          fi
          echo "Changelog entry found for version ${VERSION}"

      - name: Build bundle for npm
        run: pnpm build:bundle
        env:
          NPM_VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Verify package contents
        run: |
          cd dist/npm-package
          npm pack --dry-run
          echo "Package contents verified"

      - name: Verify npm trusted publishing OIDC
        working-directory: dist/npm-package
        run: |
          set -euo pipefail
          registry="$(npm -s config get registry || true)"
          registry="${registry%/}"
          if [ -z "${registry}" ] || [ "${registry}" = "undefined" ]; then
            registry="https://registry.npmjs.org"
          fi

          host="${registry#*://}"
          host="${host%%/*}"
          export NPM_REGISTRY="${registry}"
          export NPM_REGISTRY_HOST="${host}"

          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const registry = process.env.NPM_REGISTRY;
          const host = process.env.NPM_REGISTRY_HOST;
          const requestUrl = process.env.ACTIONS_ID_TOKEN_REQUEST_URL;
          const requestToken = process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN;

          if (!requestUrl || !requestToken) {
            throw new Error("GitHub OIDC request environment is not available");
          }

          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const packagePath = pkg.name.startsWith("@")
            ? `@${encodeURIComponent(pkg.name.slice(1))}`
            : encodeURIComponent(pkg.name);

          const idTokenResponse = await fetch(
            `${requestUrl}&audience=${encodeURIComponent(`npm:${host}`)}`,
            {
              headers: {
                authorization: `bearer ${requestToken}`,
              },
            },
          );

          if (!idTokenResponse.ok) {
            const body = await idTokenResponse.text();
            throw new Error(
              `GitHub OIDC token request failed (${idTokenResponse.status}): ${body}`,
            );
          }

          const { value } = await idTokenResponse.json();
          if (!value) {
            throw new Error("GitHub OIDC token response did not include a value");
          }

          const exchangeResponse = await fetch(
            `${registry}/-/npm/v1/oidc/token/exchange/package/${packagePath}`,
            {
              method: "POST",
              headers: {
                authorization: `Bearer ${value}`,
              },
            },
          );

          if (!exchangeResponse.ok) {
            const body = await exchangeResponse.text();
            throw new Error(
              `npm OIDC token exchange failed (${exchangeResponse.status}): ${body}`,
            );
          }

          console.log(`OIDC token exchange succeeded for ${pkg.name}`);
          NODE

      - name: Publish to npm
        run: |
          cd dist/npm-package
          npm publish --access public

      - name: Extract changelog for release notes
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{found=0} found" CHANGELOG.md > /tmp/release-notes.md
          echo "Release notes for $VERSION:"
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
