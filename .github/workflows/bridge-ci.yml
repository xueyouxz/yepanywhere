name: Bridge CI

on:
  push:
    branches: [main]
    tags:
      - 'bridge-v*'
    paths:
      - 'packages/device-bridge/**'
      - 'packages/android-device-server/**'
      - '.github/workflows/bridge-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/device-bridge/**'
      - 'packages/android-device-server/**'
      - '.github/workflows/bridge-ci.yml'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-bridge:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            binary: device-bridge-darwin-arm64
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            binary: device-bridge-darwin-amd64
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            binary: device-bridge-linux-amd64
          - goos: linux
            goarch: arm64
            runner: ubuntu-22.04-arm
            binary: device-bridge-linux-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/device-bridge/go.mod
          cache-dependency-path: packages/device-bridge/go.sum

      - name: Build binary
        working-directory: packages/device-bridge
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          # For darwin/amd64 cross-compile on arm64 runner, tell Clang to target x86_64
          if [ "${{ matrix.goos }}" = "darwin" ] && [ "${{ matrix.goarch }}" = "amd64" ]; then
            export CC="clang -arch x86_64"
          fi

          VERSION="dev"
          if [[ "$GITHUB_REF" == refs/tags/bridge-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/bridge-v}"
          fi

          go build -ldflags="-s -w -X main.bridgeVersion=$VERSION" \
            -o "${{ matrix.binary }}" ./cmd/bridge/

      - name: Verify binary
        working-directory: packages/device-bridge
        run: |
          file "${{ matrix.binary }}"
          ls -lh "${{ matrix.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary }}
          path: packages/device-bridge/${{ matrix.binary }}

  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: packages/android-device-server
        run: ./build-apk.sh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: yep-device-server-apk
          path: packages/android-device-server/app/build/outputs/apk/release/yep-device-server.apk

  release:
    if: startsWith(github.ref, 'refs/tags/bridge-v')
    needs: [build-bridge, build-apk]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/bridge-v}" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        working-directory: binaries
        run: |
          sha256sum device-bridge-* yep-device-server.apk > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Device Bridge v${{ steps.version.outputs.VERSION }}
          body: |
            ## Device Bridge v${{ steps.version.outputs.VERSION }}

            Pre-built sidecar binaries and Android device server APK for device streaming.

            | Platform | Binary |
            |----------|--------|
            | macOS (Apple Silicon) | `device-bridge-darwin-arm64` |
            | macOS (Intel) | `device-bridge-darwin-amd64` |
            | Linux x86_64 | `device-bridge-linux-amd64` |
            | Linux ARM64 | `device-bridge-linux-arm64` |

            Android server APK:
            - `yep-device-server.apk`

            After downloading, make bridge binaries executable: `chmod +x device-bridge-*`
          files: |
            binaries/device-bridge-*
            binaries/yep-device-server.apk
            binaries/checksums-sha256.txt
          draft: false
          prerelease: false
